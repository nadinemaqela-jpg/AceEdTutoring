<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - AceEd Tutoring</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #1e2a3a;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        
        .checkout-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.9rem;
        }
        
        label .required {
            color: #e74c3c;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3498db;
        }
        
        .order-summary {
            background: #f8fafd;
            border-radius: 16px;
            padding: 20px;
            height: fit-content;
        }
        
        .order-summary h3 {
            color: #1e2a3a;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
        }
        
        .order-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.3rem;
            font-weight: bold;
            color: #1e2a3a;
            padding-top: 15px;
            margin-top: 15px;
            border-top: 2px solid #e0e0e0;
        }
        
        .order-total .total-price {
            color: #27ae60;
        }
        
        .btn-pay {
            background: linear-gradient(135deg, #27ae60, #1e8449);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .btn-pay:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39,174,96,0.3);
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #3498db;
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            .checkout-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-credit-card"></i> Checkout</h1>
        <p class="subtitle">Complete your payment securely via PayFast</p>
        
        <div class="checkout-grid">
            <!-- LEFT: Checkout Form -->
            <div>
                <form id="checkoutForm">
                    <div class="form-group">
                        <label>Full Name <span class="required">*</span></label>
                        <input type="text" id="fullName" required placeholder="Enter your full name">
                    </div>
                    
                    <div class="form-group">
                        <label>Email Address <span class="required">*</span></label>
                        <input type="email" id="email" required placeholder="your@email.com">
                    </div>
                    
                    <div class="form-group">
                        <label>WhatsApp Number <span class="required">*</span></label>
                        <input type="tel" id="phone" required placeholder="e.g., 0631158739">
                    </div>
                    
                    <div class="form-group">
                        <label>Additional Notes</label>
                        <textarea id="notes" rows="3" placeholder="Any special requests?"></textarea>
                    </div>
                    
                    <button type="submit" class="btn-pay"><i class="fas fa-lock"></i> Pay Now</button>
                </form>
            </div>
            
            <!-- RIGHT: Order Summary -->
            <div class="order-summary">
                <h3><i class="fas fa-shopping-cart"></i> Order Summary</h3>
                <div id="orderItems">
                    <!-- Items will be rendered here -->
                </div>
                <div class="order-total">
                    <span>Total</span>
                    <span class="total-price" id="orderTotal">R0.00</span>
                </div>
                <p style="font-size: 0.7rem; color: #7f8c8d; margin-top: 15px; text-align: center;">
                    <i class="fas fa-lock"></i> Secure payment via PayFast
                </p>
            </div>
        </div>
        
        <a href="cart.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Cart</a>
    </div>
    
    <!-- PayFast Form (hidden) -->
    <form id="payfastForm" action="https://sandbox.payfast.co.za/eng/process" method="POST" style="display:none;">
        <input type="hidden" name="merchant_id" value="10050636">
        <input type="hidden" name="merchant_key" value="nr1iu3szc6325">
        <input type="hidden" name="return_url" value="https://aceed.co.za/payment-success.html">
        <input type="hidden" name="cancel_url" value="https://aceed.co.za/payment-cancel.html">
        <input type="hidden" name="notify_url" value="https://aceed.co.za/payment-notify.html">
        <input type="hidden" name="m_payment_id" id="m_payment_id">
        <input type="hidden" name="amount" id="amount">
        <input type="hidden" name="item_name" id="item_name">
        <input type="hidden" name="item_description" id="item_description">
        <input type="hidden" name="email_address" id="payfast_email">
        <input type="hidden" name="name_first" id="payfast_name">
        <input type="hidden" name="name_last" id="payfast_last">
        <input type="hidden" name="cell_no" id="payfast_phone">
    </form>
    
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>

<script>
    // Protect page
    protectPage();

    function renderOrderSummary() {
        const cart = getCart();
        const container = document.getElementById('orderItems');
        const totalEl = document.getElementById('orderTotal');
        
        if (cart.length === 0) {
            container.innerHTML = '<p style="color: #e74c3c;">Your cart is empty.</p>';
            totalEl.textContent = 'R0.00';
            return;
        }
        
        let html = '';
        let total = 0;
        
        cart.forEach(item => {
            const subtotal = item.price * item.quantity;
            total += subtotal;
            html += `
                <div class="order-item">
                    <span>${item.name} × ${item.quantity}</span>
                    <span>R${subtotal.toFixed(2)}</span>
                </div>
            `;
        });
        
        container.innerHTML = html;
        totalEl.textContent = `R${total.toFixed(2)}`;
        
        // Set the PayFast amount
        document.getElementById('amount').value = total.toFixed(2);
        document.getElementById('item_name').value = cart.map(i => i.name).join(', ');
        document.getElementById('item_description').value = cart.map(i => `${i.name} × ${i.quantity}`).join(', ');
    }
    
    // Load user data and render order
    document.addEventListener('DOMContentLoaded', function() {
        // Load user info
        getCurrentUser().then(user => {
            if (user) {
                document.getElementById('fullName').value = user.fullName || '';
                document.getElementById('email').value = user.email || '';
                document.getElementById('phone').value = user.phone || '';
            }
        });
        
        // Render order summary
        renderOrderSummary();
    });
    
    // Handle checkout form submission
    document.getElementById('checkoutForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const cart = getCart();
        if (cart.length === 0) {
            alert('Your cart is empty!');
            return;
        }
        
        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        
        if (!fullName || !email || !phone) {
            alert('Please fill in all required fields.');
            return;
        }
        
        const total = getCartTotal();
        const orderId = 'ACE' + Date.now();
        const itemNames = cart.map(item => item.name).join(', ');
        
        // Populate PayFast form
        document.getElementById('m_payment_id').value = orderId;
        document.getElementById('amount').value = total.toFixed(2);
        document.getElementById('item_name').value = 'AceEd Tutoring Services';
        document.getElementById('item_description').value = itemNames;
        document.getElementById('payfast_email').value = email;
        document.getElementById('payfast_name').value = fullName.split(' ')[0] || fullName;
        document.getElementById('payfast_last').value = fullName.split(' ').slice(1).join(' ') || '';
        document.getElementById('payfast_phone').value = phone;
        
        // Submit to PayFast
        document.getElementById('payfastForm').submit();
    });
</script>
</body>
</html>
