<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - AceEd Tutoring</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #1e2a3a;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .cart-empty {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }
        
        .cart-empty i {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #ddd;
        }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }
        
        .cart-item-info {
            flex: 1;
        }
        
        .cart-item-info h3 {
            color: #1e2a3a;
            margin-bottom: 5px;
        }
        
        .cart-item-info p {
            color: #7f8c8d;
            font-size: 0.9rem;
        }
        
        .cart-item-price {
            font-weight: bold;
            color: #27ae60;
            font-size: 1.2rem;
        }
        
        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .quantity-btn {
            background: #f0f0f0;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .quantity-btn:hover {
            background: #3498db;
            color: white;
        }
        
        .quantity-display {
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }
        
        .remove-btn {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        
        .remove-btn:hover {
            transform: scale(1.2);
        }
        
        .cart-summary {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }
        
        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            font-weight: bold;
            color: #1e2a3a;
        }
        
        .cart-total .total-price {
            color: #27ae60;
        }
        
        .checkout-btn {
            display: inline-block;
            background: linear-gradient(135deg, #27ae60, #1e8449);
            color: white;
            padding: 15px 40px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            margin-top: 20px;
            transition: all 0.3s;
            width: 100%;
            text-align: center;
        }
        
        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39,174,96,0.3);
        }
        
        .continue-btn {
            display: inline-block;
            color: #3498db;
            text-decoration: none;
            margin-top: 15px;
            font-weight: 500;
        }
        
        .continue-btn:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            .cart-item {
                flex-wrap: wrap;
            }
            .cart-item-actions {
                width: 100%;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-shopping-cart"></i> Your Cart</h1>
        
        <div id="cartContent">
            <!-- Cart items will be rendered here -->
        </div>
        
        <a href="index.html" class="continue-btn"><i class="fas fa-arrow-left"></i> Continue Shopping</a>
    </div>

<script src="js/auth.js"></script>
<script src="js/cart.js"></script>

<script>
    // Protect page - only logged-in users can access cart
    protectPage();

    function renderCart() {
        const cart = getCart();
        const container = document.getElementById('cartContent');
        
        if (cart.length === 0) {
            container.innerHTML = `
                <div class="cart-empty">
                    <i class="fas fa-shopping-cart"></i>
                    <h2>Your cart is empty</h2>
                    <p>Browse our services and add items to your cart.</p>
                    <a href="pricing.html" style="display: inline-block; margin-top: 20px; background: #3498db; color: white; padding: 12px 30px; border-radius: 40px; text-decoration: none;">Browse Services</a>
                </div>
            `;
            return;
        }
        
        let html = '';
        let total = 0;
        
        cart.forEach((item, index) => {
            const subtotal = item.price * item.quantity;
            total += subtotal;
            
            html += `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <h3>${item.name}</h3>
                        <p>${item.type || 'Service'}</p>
                    </div>
                    <div style="text-align: right;">
                        <div class="cart-item-price">R${subtotal.toFixed(2)}</div>
                        <div class="cart-item-actions">
                            <button class="quantity-btn" onclick="changeQuantity(${index}, -1)">-</button>
                            <span class="quantity-display">${item.quantity}</span>
                            <button class="quantity-btn" onclick="changeQuantity(${index}, 1)">+</button>
                            <button class="remove-btn" onclick="removeItem(${index})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `;
        });
        
        html += `
            <div class="cart-summary">
                <div class="cart-total">
                    <span>Total</span>
                    <span class="total-price">R${total.toFixed(2)}</span>
                </div>
                <a href="checkout.html" class="checkout-btn"><i class="fas fa-lock"></i> Proceed to Checkout</a>
            </div>
        `;
        
        container.innerHTML = html;
    }
    
    function changeQuantity(index, delta) {
        const cart = getCart();
        const item = cart[index];
        if (item) {
            item.quantity += delta;
            if (item.quantity <= 0) {
                cart.splice(index, 1);
            }
            saveCart(cart);
            renderCart();
            updateCartCount();
        }
    }
    
    function removeItem(index) {
        const cart = getCart();
        cart.splice(index, 1);
        saveCart(cart);
        renderCart();
        updateCartCount();
    }
    
    // Render cart on page load
    document.addEventListener('DOMContentLoaded', renderCart);
</script>
    
</body>
</html>
